name: Docker Builds

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/docker-build.yml
      - docker-compose.yml
      - anidb-service/**
      - plex-oauth/**
      - trakt-oauth/**
      - mal-oauth/**
      - simkl-oauth/**
      - simkl-service/**
      - imdb-service/**
  workflow_dispatch:

jobs:
  build-imdb-base:
    name: Build imdb-service-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set base image tag
        id: tag
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/kometa-team/imdb-service-base
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.tag.outputs.image_tag }}

      - name: Build imdb-service-base
        uses: docker/build-push-action@v7
        with:
          context: ./imdb-service
          file: ./imdb-service/Dockerfile.base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public
        run: |
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"visibility":"public"}' \
            https://api.github.com/user/packages/container/imdb-service-base/settings
        continue-on-error: true

  build-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: anidb-mirror
            context: ./anidb-service
            file: ./anidb-service/Dockerfile
          - image: plex-oauth
            context: ./plex-oauth
            file: ./plex-oauth/Dockerfile
          - image: trakt-oauth
            context: ./trakt-oauth
            file: ./trakt-oauth/Dockerfile
          - image: mal-oauth
            context: ./mal-oauth
            file: ./mal-oauth/Dockerfile
          - image: simkl-oauth
            context: ./simkl-oauth
            file: ./simkl-oauth/Dockerfile
          - image: simkl-service
            context: ./simkl-service
            file: ./simkl-service/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/kometa-team/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public
        run: |
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"visibility":"public"}' \
            https://api.github.com/user/packages/container/${{ matrix.image }}/settings
        continue-on-error: true

  build-imdb-service:
    name: Build imdb-service
    runs-on: ubuntu-latest
    needs: build-imdb-base
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/kometa-team/imdb-service
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build imdb-service
        uses: docker/build-push-action@v7
        with:
          context: ./imdb-service
          file: ./imdb-service/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=ghcr.io/kometa-team/imdb-service-base:${{ needs.build-imdb-base.outputs.image_tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public
        run: |
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"visibility":"public"}' \
            https://api.github.com/user/packages/container/imdb-service/settings
        continue-on-error: true
