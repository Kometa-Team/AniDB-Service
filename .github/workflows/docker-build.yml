name: Docker Builds

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/docker-build.yml
      - docker-compose.yml
      - anidb-service/**
      - plex-oauth/**
      - trakt-oauth/**
      - mal-oauth/**
  workflow_dispatch:

jobs:
  build-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: anidb-mirror
            context: ./anidb-service
            file: ./anidb-service/Dockerfile
          - image: plex-oauth
            context: ./plex-oauth
            file: ./plex-oauth/Dockerfile
          - image: trakt-oauth
            context: ./trakt-oauth
            file: ./trakt-oauth/Dockerfile
          - image: mal-oauth
            context: ./mal-oauth
            file: ./mal-oauth/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/kometa-team/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
