name: Tests

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('anidb-service/requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install test dependencies (anidb-service)
      run: |
        python -m pip install --upgrade pip
        pip install -r anidb-service/requirements-dev.txt

    - name: Run tests (anidb-service)
      working-directory: anidb-service
      env:
        XML_DIR: /tmp/test_anidb/data
        DB_PATH: /tmp/test_anidb/test.db
      run: |
        pytest

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./anidb-service/coverage.xml
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff black isort mypy

    - name: Run ruff
      run: ruff check .
      continue-on-error: true

    - name: Run black
      run: black --check .
      continue-on-error: true

    - name: Run isort
      run: isort --check-only .
      continue-on-error: true

    - name: Run mypy
      run: mypy main.py --ignore-missing-imports --install-types
      continue-on-error: true
