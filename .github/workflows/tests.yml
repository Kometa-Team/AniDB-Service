name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        service: ["anidb-service", "plex-oauth", "trakt-oauth", "mal-oauth"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('anidb-service/requirements-dev.txt', 'plex-oauth/requirements.txt', 'trakt-oauth/requirements.txt', 'mal-oauth/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install test dependencies for ${{ matrix.service }}
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        case "${{ matrix.service }}" in
          anidb-service)
            pip install -r anidb-service/requirements-dev.txt
            ;;
          plex-oauth)
            pip install -r plex-oauth/requirements.txt
            ;;
          trakt-oauth)
            pip install -r trakt-oauth/requirements.txt
            ;;
          mal-oauth)
            pip install -r mal-oauth/requirements.txt
            ;;
          *)
            echo "Unknown service ${{ matrix.service }}, skipping service-specific dependencies"
            ;;
        esac

    - name: Run tests (${{ matrix.service }})
      working-directory: ${{ matrix.service }}
      env:
        XML_DIR: /tmp/test_anidb/data
        DB_PATH: /tmp/test_anidb/test.db
      run: |
        if ls test_*.py 1> /dev/null 2>&1 || ls tests/test_*.py 1> /dev/null 2>&1; then
          pytest
        else
          echo "No tests found for ${{ matrix.service }}, skipping."
        fi

    - name: Upload coverage to Codecov (anidb-service only)
      if: matrix.service == 'anidb-service'
      uses: codecov/codecov-action@v3
      with:
        file: ./anidb-service/coverage.xml
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install pre-commit
      run: |
        python -m pip install --upgrade pip
        pip install pre-commit

    - name: Cache pre-commit environments
      uses: actions/cache@v4
      with:
        path: ~/.cache/pre-commit
        key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pre-commit-

    - name: Run pre-commit (lint & type checks)
      run: pre-commit run --all-files --show-diff-on-failure
