name: Docker PR Builds

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/docker-pr-build.yml
      - .github/workflows/docker-build.yml
      - docker-compose.yml
      - anidb-service/**
      - plex-oauth/**
      - trakt-oauth/**
      - mal-oauth/**
      - simkl-oauth/**
      - simkl-service/**
      - imdb-service/**

jobs:
  build-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: anidb-mirror
            context: ./anidb-service
            file: ./anidb-service/Dockerfile
          - image: plex-oauth
            context: ./plex-oauth
            file: ./plex-oauth/Dockerfile
          - image: trakt-oauth
            context: ./trakt-oauth
            file: ./trakt-oauth/Dockerfile
          - image: mal-oauth
            context: ./mal-oauth
            file: ./mal-oauth/Dockerfile
          - image: simkl-oauth
            context: ./simkl-oauth
            file: ./simkl-oauth/Dockerfile
          - image: simkl-service
            context: ./simkl-service
            file: ./simkl-service/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          tags: kometa-utilities/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-imdb-service:
    name: Build imdb-service
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build imdb-service-base
        uses: docker/build-push-action@v7
        with:
          context: ./imdb-service
          file: ./imdb-service/Dockerfile.base
          push: false
          load: true
          tags: kometa-utilities/imdb-service-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build imdb-service
        uses: docker/build-push-action@v7
        with:
          context: ./imdb-service
          file: ./imdb-service/Dockerfile
          push: false
          build-args: |
            BASE_IMAGE=kometa-utilities/imdb-service-base:${{ github.sha }}
          tags: kometa-utilities/imdb-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
