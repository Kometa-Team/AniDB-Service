services:
  anidb-mirror:
    image: ghcr.io/kometa-team/anidb-mirror:latest
    container_name: anidb-mirror
    restart: unless-stopped
    env_file:
      - ./anidb-service/.env
    environment:
      - UVICORN_WORKERS=1  # Reduce for low-memory systems
    volumes:
      - anidb-data:/app/data
      - anidb-db:/app/database
      - ./anidb-service/seed_data:/app/seed_data:ro
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  plex-oauth:
    image: ghcr.io/kometa-team/plex-oauth:latest
    container_name: plex-oauth
    restart: unless-stopped
    env_file:
      - ./plex-oauth/.env
    environment:
      - ROOT_PATH=/plex-oauth
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  trakt-oauth:
    image: ghcr.io/kometa-team/trakt-oauth:latest
    container_name: trakt-oauth
    restart: unless-stopped
    environment:
      - ROOT_PATH=/trakt-oauth
      - SECRET_KEY=${TRAKT_SECRET_KEY:-changeme-generate-random-key}
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  mal-oauth:
    image: ghcr.io/kometa-team/mal-oauth:latest
    container_name: mal-oauth
    restart: unless-stopped
    environment:
      - ROOT_PATH=/mal-oauth
      - SECRET_KEY=${MAL_SECRET_KEY:-changeme-generate-random-key}
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  fider-db:
    restart: always
    container_name: fider-db
    image: postgres:17
    env_file:
      - ./features-fider/.env
    volumes:
      - fider-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  features-fider:
    restart: always
    container_name: features-fider
    image: getfider/fider:stable
    env_file:
      - ./features-fider/.env
    depends_on:
      fider-db:
        condition: service_healthy

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./index.html:/var/www/html/index.html
      - ./maintenance.html:/var/www/html/maintenance.html
      - caddy_data:/data
      - caddy_config:/config

volumes:
  anidb-data:
  anidb-db:
  fider-db:
  caddy_data:
  caddy_config:
