services:
  anidb-mirror:
    image: ghcr.io/kometa-team/anidb-mirror:latest
    container_name: anidb-mirror
    restart: unless-stopped
    env_file:
      - ./anidb-service/.env
    environment:
      - UVICORN_WORKERS=1  # Reduce for low-memory systems
    volumes:
      - anidb-data:/app/data
      - anidb-db:/app/database
      - ./anidb-service/seed_data:/app/seed_data:ro
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  plex-oauth:
    image: ghcr.io/kometa-team/plex-oauth:latest
    container_name: plex-oauth
    restart: unless-stopped
    env_file:
      - ./plex-oauth/.env
    environment:
      - ROOT_PATH=/plex-oauth
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  trakt-oauth:
    image: ghcr.io/kometa-team/trakt-oauth:latest
    container_name: trakt-oauth
    restart: unless-stopped
    environment:
      - ROOT_PATH=/trakt-oauth
      - SECRET_KEY=${TRAKT_SECRET_KEY:-changeme-generate-random-key}
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  mal-oauth:
    image: ghcr.io/kometa-team/mal-oauth:latest
    container_name: mal-oauth
    restart: unless-stopped
    environment:
      - ROOT_PATH=/mal-oauth
      - SECRET_KEY=${MAL_SECRET_KEY:-changeme-generate-random-key}
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  simkl-oauth:
    image: ghcr.io/kometa-team/simkl-oauth:latest
    container_name: simkl-oauth
    restart: unless-stopped
    environment:
      - ROOT_PATH=/simkl-oauth
      - CLIENT_ID=${SIMKL_CLIENT_ID:?SIMKL_CLIENT_ID must be set in .env}
      - CLIENT_SECRET=${SIMKL_CLIENT_SECRET:?SIMKL_CLIENT_SECRET must be set in .env}
      - REDIRECT_URI=${SIMKL_REDIRECT_URI:?SIMKL_REDIRECT_URI must be set in .env}
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  simkl-service:
    image: ghcr.io/kometa-team/simkl-service:latest
    container_name: simkl-service
    restart: unless-stopped
    environment:
      - ROOT_PATH=/simkl-service
    volumes:
      - simkl-data:/app/data
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  fider-db:
    restart: always
    container_name: fider-db
    image: postgres:17
    env_file:
      - ./features-fider/.env
    volumes:
      - fider-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  features-fider:
    restart: always
    container_name: features-fider
    image: getfider/fider:stable
    env_file:
      - ./features-fider/.env
    depends_on:
      fider-db:
        condition: service_healthy

  image-compare:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount reference images directory (adjust path as needed for your remote server)
      - /path/to/Default-Images:/app/ref_images:ro
      # Mount generated images directory
      - ./create_defaults/defaults-en:/app/defaults-en:ro
    environment:
      # Optional: Set reference directory path
      REF_DIR: /app/ref_images
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/tree"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  imdb-service:
    image: ghcr.io/kometa-team/imdb-service:latest
    container_name: imdb-service
    restart: unless-stopped
    environment:
      - ROOT_PATH=/imdb-service
      - REFRESH_HOUR=3
      - DATA_DIR=/app/data
      - TMP_DIR=/app/data
      - MIN_VOTES_CHART=25000
      - PARENTAL_PROXY_ENABLED=${PARENTAL_PROXY_ENABLED:-false}
      - PARENTAL_PROXY_URLS=${PARENTAL_PROXY_URLS:-}
      - PARENTAL_PROXY_RETRY_COUNT=${PARENTAL_PROXY_RETRY_COUNT:-1}
      - PARENTAL_PROXY_BAN_TTL_MINUTES=${PARENTAL_PROXY_BAN_TTL_MINUTES:-30}
    volumes:
      - imdb-data:/app/data
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./index.html:/var/www/html/index.html
      - ./maintenance.html:/var/www/html/maintenance.html
      - caddy_data:/data
      - caddy_config:/config

volumes:
  anidb-data:
  imdb-data:
  anidb-db:
  simkl-data:
  fider-db:
  caddy_data:
  caddy_config:
