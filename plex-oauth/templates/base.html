<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Plex OAuth{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- Plex brand tokens --- */
        :root {
            --plex-orange:       #E5A00D;
            --plex-orange-dark:  #C98B00;
            --plex-orange-glow:  rgba(229, 160, 13, 0.25);
            --bg-page:           #141414;
            --bg-card:           #1f1f1f;
            --bg-inset:          #161616;
            --border-subtle:     rgba(255, 255, 255, 0.07);
            --text-primary:      #f0f0f0;
            --text-muted:        #999;
            --error-red:         #e05260;
            --error-bg:          rgba(220, 53, 69, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--bg-card);
            border-radius: 14px;
            border-top: 3px solid var(--plex-orange);
            padding: 40px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
        }

        /* Plex logo mark (inline SVG) */
        .plex-logo {
            display: block;
            width: 52px;
            height: 52px;
            margin-bottom: 22px;
        }

        h1 {
            color: var(--plex-orange);
            margin-bottom: 10px;
            font-size: 1.85em;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        h2 {
            color: var(--plex-orange);
            margin-bottom: 20px;
            font-size: 1.4em;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1.05em;
        }

        .btn {
            display: inline-block;
            background: var(--plex-orange);
            color: #111;
            padding: 14px 38px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1em;
            letter-spacing: 0.3px;
            transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--plex-orange-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px var(--plex-orange-glow);
        }

        .token-box {
            background: var(--bg-inset);
            border: 1.5px solid var(--plex-orange);
            border-radius: 8px;
            padding: 18px 20px;
            margin: 20px 0;
            word-break: break-all;
            font-family: "Courier New", monospace;
            font-size: 0.9em;
            color: var(--plex-orange);
            line-height: 1.5;
        }

        .info-box {
            background: rgba(229, 160, 13, 0.08);
            border-left: 4px solid var(--plex-orange);
            padding: 14px 16px;
            margin: 20px 0;
            border-radius: 0 6px 6px 0;
            font-size: 0.95em;
            line-height: 1.55;
        }

        .error-box {
            background: var(--error-bg);
            border-left: 4px solid var(--error-red);
            padding: 14px 16px;
            margin: 20px 0;
            border-radius: 0 6px 6px 0;
            color: #f08090;
            font-size: 0.95em;
        }

        .user-info {
            margin: 20px 0;
            padding: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
        }

        .user-info p {
            margin: 10px 0;
            font-size: 0.97em;
        }

        .user-info strong {
            color: var(--plex-orange);
        }

        @media (max-width: 600px) {
            .container {
                padding: 28px 18px;
            }

            h1 { font-size: 1.45em; }
            h2 { font-size: 1.15em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Plex logo mark -->
        <svg class="plex-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-label="Plex">
            <rect width="48" height="48" rx="10" fill="#E5A00D"/>
            <path d="M19 12 L37 24 L19 36 Z" fill="#141414"/>
        </svg>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
